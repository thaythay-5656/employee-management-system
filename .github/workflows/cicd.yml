name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Backend Dependencies
        run: |
          cd backend/employee_management
          pip install -r requirements.txt

      - name: Run Django Tests
        run: |
          cd backend/employee_management
          python manage.py test

  build-and-deploy:
    needs: test-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ems-backend:latest

      - name: Build and Push Frontend Production Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile  # Uses your single, unified Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ems-frontend:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            
            # 1. Stop existing containers cleanly
            docker compose down
            
            # 2. Force clean tracking by pulling down fresh images
            docker compose pull
            
            # 3. Spin up the updated configuration
            docker compose up -d
            
            # 4. Wipe out dead dangling image caches to preserve disk space
            docker image prune -af