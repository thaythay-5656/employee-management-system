name: EMS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/ems-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/ems-frontend

jobs:
  # ── 1. Backend Tests ───────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend/employee_management
        run: |
          pip install -r requirements.txt
          pip install gunicorn

      - name: Run Django tests
        working-directory: backend/employee_management
        env:
          SECRET_KEY: "ci-test-secret-key-not-used-in-prod"
          DEBUG: "True"
          DB_ENGINE: django.db.backends.sqlite3
        run: |
          python manage.py migrate --noinput
          python manage.py test ems --verbosity=2

  # ── 2. Frontend Build ──────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/employee-hub/package-lock.json

      - name: Install dependencies
        working-directory: frontend/employee-hub
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend/employee-hub
        run: npm run build

  # ── 3. Build & Push Docker Images (only on push to main or develop) ────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "TAG=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/employee_management
          file: ./backend/employee_management/Dockerfile
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/employee-hub
          file: ./frontend/employee-hub/Dockerfile
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.TAG }}

  # ── 4. Deploy to Dev (develop branch) ─────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'develop' && github.event_name == 'push'
    environment: development

    steps:
      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /opt/ems
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  # ── 5. Deploy to Prod (main branch) ───────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/ems
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f