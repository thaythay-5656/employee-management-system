global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Django backend — requires django-prometheus installed
  - job_name: "django-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  # Node Exporter — system CPU, memory, disk on the EC2 instance
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Postgres Exporter
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]