apiVersion: apps/v1
kind: Deployment
metadata:
  name: ems-frontend
  namespace: ems
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ems-frontend
  template:
    metadata:
      labels:
        app: ems-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/soysanny/ems-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8080"
            - name: VITE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: VITE_API_BASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: ems-frontend
  namespace: ems
spec:
  selector:
    app: ems-frontend
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
