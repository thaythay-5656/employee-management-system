version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ems_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-EMSDB}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ems_network

  # ── Django Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/employee_management
      dockerfile: Dockerfile
    container_name: ems_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: "5432"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,http://127.0.0.1:8081}
    volumes:
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - ems_network

  # ── React Frontend (Vite dev in Docker) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend/employee-hub
      dockerfile: Dockerfile
    container_name: ems_frontend
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    command: npm run dev -- --host 0.0.0.0 --port 8080
    depends_on:
      - backend
    ports:
      - "8081:8080"
    networks:
      - ems_network

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ems_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    networks:
      - ems_network

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ems_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    networks:
      - ems_network

  # ── Node Exporter (CPU, memory, disk) ───────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ems_node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - ems_network

  # ── Postgres Exporter ────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ems_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-EMSDB}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9187:9187"
    networks:
      - ems_network

volumes:
  postgres_data:
  media_files:
  prometheus_data:
  grafana_data:

networks:
  ems_network:
    driver: bridge
